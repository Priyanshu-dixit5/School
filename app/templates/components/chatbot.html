<!-- Floating Chat Widget -->
<div id="chatWidget" class="chat-widget">
    <button id="chatToggle" class="chat-toggle" aria-label="Open chat">
        <i class="bi bi-chat-dots-fill"></i>
        <span class="chat-badge">AI</span>
    </button>

    <div id="chatPanel" class="chat-panel">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar"><i class="bi bi-robot"></i></div>
                <div>
                    <h6>School AI Assistant</h6>
                    <span class="chat-status"><span class="status-dot"></span> Online</span>
                </div>
            </div>
            <button id="chatClose" class="chat-close" aria-label="Close chat"><i class="bi bi-x-lg"></i></button>
        </div>
        <div id="chatMessages" class="chat-messages">
            <div class="chat-message bot">
                <div class="message-bubble">
                    Hello! I'm your AI school assistant. Ask me about admissions, facilities, timings, fees, or anything about {{ school_name }}!
                </div>
            </div>
        </div>
        <div id="chatTyping" class="chat-typing" style="display:none;">
            <span></span><span></span><span></span>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your message..." maxlength="1000" autocomplete="off">
            <button id="chatSend" aria-label="Send"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</div>
