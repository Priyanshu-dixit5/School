<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Inter,sans-serif;color:#111827;max-width:600px;margin:0 auto;padding:20px">
    <div style="background:#0F172A;color:#fff;padding:24px;border-radius:12px 12px 0 0">
        <h2 style="margin:0;color:#F59E0B">New Inquiry</h2>
        <p style="margin:8px 0 0">{{ school_name }}</p>
    </div>
    <div style="background:#fff;padding:24px;border:1px solid #E5E7EB;border-top:none;border-radius:0 0 12px 12px">
        <table style="width:100%">
            <tr><td style="padding:8px 0"><strong>Name:</strong></td><td>{{ contact.name }}</td></tr>
            <tr><td style="padding:8px 0"><strong>Email:</strong></td><td>{{ contact.email }}</td></tr>
            <tr><td style="padding:8px 0"><strong>Phone:</strong></td><td>{{ contact.phone or 'N/A' }}</td></tr>
            <tr><td style="padding:8px 0"><strong>Inquiry Type:</strong></td><td>{{ query_type_label(contact.query_type or 'general') }}</td></tr>
        </table>
        <h3>Message</h3>
        <p style="background:#F8FAFC;padding:16px;border-radius:8px">{{ contact.message }}</p>
    </div>
</body>
</html>
