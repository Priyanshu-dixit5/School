{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit Job' if job else 'Create Job' }}{% endblock %}
{% block content %}
<div class="admin-header">
    <div><h2>{{ 'Edit Job' if job else 'Create Job' }}</h2></div>
    <a href="{{ url_for('admin.jobs_list') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>

<div class="admin-card">
    <div class="admin-card-body">
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-4">
                <div class="col-md-8">
                    <div class="mb-3">
                        <label class="form-label">Job Title *</label>
                        <input type="text" name="title" class="form-control" required value="{{ (data or job).title if (data or job) else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description *</label>
                        <textarea name="description" class="form-control" rows="6" required>{{ (data or job).description if (data or job) else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Requirements</label>
                        <textarea name="requirements" class="form-control" rows="4">{{ (data or job).requirements if (data or job) else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Benefits</label>
                        <textarea name="benefits" class="form-control" rows="3">{{ (data or job).benefits if (data or job) else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Skills</label>
                        <input type="text" name="skills" class="form-control" placeholder="Comma-separated skills" value="{{ (data or job).skills if (data or job) else '' }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            {% for s in ['draft','published','closed','archived'] %}
                            <option value="{{ s }}" {% if (data or job) and (data or job).status == s %}selected{% endif %}>{{ s|title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category_id" class="form-select">
                            <option value="">— Select —</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if (data or job) and (data or job).category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company</label>
                        <select name="company_id" class="form-select">
                            <option value="">— Select —</option>
                            {% for co in companies %}
                            <option value="{{ co.id }}" {% if (data or job) and (data or job).company_id == co.id %}selected{% endif %}>{{ co.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Type</label>
                        <select name="job_type" class="form-select">
                            {% for t in ['full-time','part-time','contract','internship','remote'] %}
                            <option value="{{ t }}" {% if (data or job) and (data or job).job_type == t %}selected{% endif %}>{{ t|replace('-',' ')|title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" value="{{ (data or job).location if (data or job) else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="text" name="salary" class="form-control" value="{{ (data or job).salary if (data or job) else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Experience</label>
                        <input type="text" name="experience" class="form-control" value="{{ (data or job).experience if (data or job) else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deadline</label>
                        <input type="date" name="deadline" class="form-control" value="{{ (data or job).deadline if (data or job) and (data or job).deadline else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Openings</label>
                        <input type="number" name="openings" class="form-control" min="1" value="{{ (data or job).openings if (data or job) else 1 }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Banner Image</label>
                        <input type="file" name="banner" class="form-control" accept="image/*">
                        {% if job and job.banner_url %}<img src="{{ job.banner_url }}" class="img-thumbnail mt-2" style="max-height:80px">{% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Additional Images</label>
                        <input type="file" name="images" class="form-control" accept="image/*" multiple>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-lg me-1"></i>Save Job</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
