{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit Company' if company else 'Add Company' }}{% endblock %}
{% block content %}
<div class="admin-header">
    <div><h2>{{ 'Edit Company' if company else 'Add Company' }}</h2></div>
    <a href="{{ url_for('admin.companies_list') }}" class="btn btn-outline-secondary">Back</a>
</div>
<div class="admin-card">
    <div class="admin-card-body">
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Company Name *</label><input type="text" name="name" class="form-control" required value="{{ company.name if company else '' }}"></div>
                <div class="col-md-6"><label class="form-label">Website</label><input type="url" name="website" class="form-control" value="{{ company.website if company else '' }}"></div>
                <div class="col-md-6"><label class="form-label">Location</label><input type="text" name="location" class="form-control" value="{{ company.location if company else '' }}"></div>
                <div class="col-md-6"><label class="form-label">Logo</label><input type="file" name="logo" class="form-control" accept="image/*">{% if company and company.logo_url %}<img src="{{ company.logo_url }}" class="mt-2" style="max-height:50px">{% endif %}</div>
                <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="4">{{ company.description if company else '' }}</textarea></div>
                <div class="col-12"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" {% if not company or company.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div></div>
            </div>
            <button type="submit" class="btn btn-primary mt-4">Save</button>
        </form>
        {% if company %}
        <form method="POST" action="{{ url_for('admin.companies_delete', company_id=company.id) }}" class="mt-3" onsubmit="return confirm('Delete?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-outline-danger">Delete Company</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
